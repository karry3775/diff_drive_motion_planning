# Waypoint configuration for trajectory smoother
# Each waypoint is [x, y] in meters

waypoints:
  - [0.0, 0.0]
  - [1.0, 0.5]
  - [2.0, 1.5]
  - [3.0, 1.0]
  - [4.0, 2.0]
  - [5.0, 2.5]
  - [6.0, 1.5]
  - [7.0, 0.5]

# Path smoothing parameters
smoothing:
  num_samples: 200          # Number of points on the smoothed path
  spline_order: 3           # Cubic spline (3) or quintic (5)

# Trajectory generation parameters
trajectory:
  max_velocity: 0.22        # m/s (TurtleBot3 Burger max: 0.22)
  max_acceleration: 0.5     # m/s^2
  max_deceleration: 0.5     # m/s^2
  dt: 0.05                  # Trajectory sample period (s)

# Pure pursuit controller parameters
controller:
  lookahead_distance: 0.3   # meters
  min_lookahead: 0.15       # meters
  max_lookahead: 0.6        # meters
  goal_tolerance: 0.1       # meters — stop when this close to final waypoint
  max_angular_velocity: 2.84  # rad/s (TurtleBot3 Burger max)
  linear_gain: 1.0          # Proportional gain on linear velocity
